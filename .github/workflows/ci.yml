name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  #Ignore commits on README to avoid running the pipeline on it's change
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "test"
  test:
    name: Molecule
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Check out the codebase
      # Checks-out the repository under $GITHUB_WORKSPACE
        uses: actions/checkout@v4

      # Sets up Python on the GitHub runner's environment
      - name: Set up Python3.
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      # Installs dependencies needed for testing
      - name: Install test dependencies.
        run: |
          python -m pip install --upgrade pip
          pip install \
          ansible-core==2.15.9 \
          molecule==6.0.2 \
          molecule-docker==2.1.0 \
          docker \
          yamllint \
          ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.docker:==3.4.11


      # Runs molecule tests
      - name: Run Molecule tests.
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

      
